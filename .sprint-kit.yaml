target_stack:
  framework: "Next.js 15"
  runtime: "React 19"
  language: "TypeScript"
  styling: "Tailwind CSS v3 + class-variance-authority (CVA)"
  state_management: "@tanstack/react-query"
  animation: "motion (Framer Motion v12) + react-lottie-player"
  carousel: "embla-carousel-react"
  icons: "lucide-react"
  monorepo: "pnpm + Turborepo"
  package_manager: "pnpm@10"

default_sources:
  - type: github-tarball
    url: https://github.com/re-speak/podo-backend
    description: "podo 백엔드"
  - type: github-tarball
    url: https://github.com/re-speak/podo-app
    description: "podo 앱"
    usage_hint: context
  - type: github-tarball
    url: https://github.com/re-speak/podo-ontology
    description: "podo 온톨로지"
  - type: github-tarball
    url: https://github.com/re-speak/vibe-design/tree/feature/design-system-ontology
    description: "podo Design System, 디자인 온톨로지, 디자인 assets"
  - type: add-dir
    path: ./sources
    description: "로컬 참고 자료 (디자인 가이드, 이용약관)"
    usage_hint: context
