# sync-docs 프로젝트별 설정
project:
  name: podo-app
  type: typescript-monorepo
  doc_root: podo-docs

source:
  patterns:
    - "apps/**/*.{ts,tsx}"
    - "packages/**/*.{ts,tsx}"
  exclude:
    - "**/*.test.{ts,tsx}"
    - "**/*.spec.{ts,tsx}"
    - "**/node_modules/**"
    - "**/.next/**"
    - "**/dist/**"

domains:
  - code_pattern: "apps/web/"
    doc_path: "apps/"
    doc_file: "web.md"

  - code_pattern: "apps/server/"
    doc_path: "apps/"
    doc_file: "server.md"

  - code_pattern: "apps/native/"
    doc_path: "apps/"
    doc_file: "native.md"

  - code_pattern: "apps/legacy-web/"
    doc_path: "apps/"
    doc_file: "legacy-web.md"

  - code_pattern: "apps/web/src/core/"
    doc_path: "apps/"
    doc_file: "web.md"

  - code_pattern: "apps/web/src/entities/"
    doc_path: "apps/"
    doc_file: "web.md"

  - code_pattern: "apps/web/src/features/"
    doc_path: "apps/"
    doc_file: "web.md"

  - code_pattern: "apps/web/src/shared/"
    doc_path: "apps/"
    doc_file: "web.md"

  - code_pattern: "apps/web/src/widgets/"
    doc_path: "apps/"
    doc_file: "web.md"

  - code_pattern: "packages/"
    doc_path: "packages/"
    doc_file: "README.md"

file_types:
  component:
    patterns:
      - "**/components/**/*.tsx"
      - "**/widgets/**/*.tsx"
    target_docs:
      - "indexes/components-index.md"
      - "design-system/README.md"
      - "apps/web.md"

  route:
    patterns:
      - "**/app/**/page.tsx"
      - "**/pages/**/*.tsx"
    target_docs:
      - "indexes/routes-index.md"
      - "user-flows.md"

  api:
    patterns:
      - "**/api/**/*.ts"
      - "**/routes/**/*.ts"
    target_docs:
      - "indexes/api-index.md"

  hook:
    patterns:
      - "**/hooks/**/*.{ts,tsx}"
    target_docs:
      - "{app}.md"

  provider:
    patterns:
      - "**/providers/**/*.tsx"
    target_docs:
      - "architecture/overview.md"

# 디렉토리 구조 변경 시 앱 문서의 트리 구조 업데이트
directory_structure:
  # 새 폴더 추가/삭제/이동 시 해당 앱 문서의 디렉토리 트리 갱신
  mappings:
    - code_pattern: "apps/web/src/**"
      target_doc: "apps/web.md"
      tree_section: "src/ 상세 구조"

    - code_pattern: "apps/web/src/core/**"
      target_doc: "apps/web.md"
      tree_section: "Core Layer"

    - code_pattern: "apps/web/src/shared/**"
      target_doc: "apps/web.md"
      tree_section: "Shared Layer"

    - code_pattern: "apps/web/src/features/**"
      target_doc: "apps/web.md"
      tree_section: "Features Layer"

    - code_pattern: "apps/web/src/entities/**"
      target_doc: "apps/web.md"
      tree_section: "Entities Layer"

    - code_pattern: "apps/web/src/widgets/**"
      target_doc: "apps/web.md"
      tree_section: "Widgets Layer"

    - code_pattern: "apps/web/src/views/**"
      target_doc: "apps/web.md"
      tree_section: "Views 레이어"

    - code_pattern: "apps/server/src/domains/**"
      target_doc: "apps/server.md"
      tree_section: "Domains 구조"

    - code_pattern: "apps/native/src/**"
      target_doc: "apps/native.md"
      tree_section: "App 구조"

    - code_pattern: "design-system/**"
      target_doc: "design-system/README.md"
      tree_section: "패키지 구조"

unmapped_domain_action: warn
